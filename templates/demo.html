<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Isolation Level Demo - Universal DB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .connection-panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .connection-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .connection-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .dump-upload {
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
            margin-top: 15px;
        }

        .file-upload {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .isolation-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .queries-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .query-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .query-box h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .query-box textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }

        .schema-info {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .button-group {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .results {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .result-item {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow-x: auto;
        }

        .result-header {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
        }

        .result-content {
            padding: 15px;
            background: #fafafa;
        }

        .success {
            color: #4caf50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
            font-weight: bold;
        }

        .info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 10px;
        }

        .connected {
            background: #4caf50;
            color: white;
        }

        .disconnected {
            background: #f44336;
            color: white;
        }

        @media (max-width: 768px) {
            .queries-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 SQL Isolation Level Demo <span id="connectionStatus" class="status-badge disconnected">Не подключено</span></h1>

        <!-- Панель подключения -->
        <div class="connection-panel">
            <h3>🔌 Подключение к базе данных</h3>
            <div class="connection-form">
                <input type="text" id="dbHost" placeholder="Хост (localhost)" value="localhost">
                <input type="text" id="dbPort" placeholder="Порт (5432)" value="5432">
                <input type="text" id="dbUser" placeholder="Пользователь (postgres)" value="postgres">
                <input type="password" id="dbPassword" placeholder="Пароль">
                <input type="text" id="dbName" placeholder="Имя БД" value="postgres">
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="connectDatabase()">🔗 Подключиться</button>
                <button onclick="showTables()">📋 Показать таблицы</button>
            </div>

            <div class="dump-upload">
                <h4>📤 Загрузить дамп БД</h4>
                <div class="file-upload">
                    <input type="file" id="dumpFile" accept=".sql">
                    <button onclick="uploadDump()">Загрузить и восстановить</button>
                </div>
                <div class="info" style="margin-top: 10px;">
                    💡 Поддерживаются SQL дампы (pg_dump, mysqldump в формате SQL)
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="isolation-selector">
                <label>🔒 Уровень изоляции транзакций:</label>
                <select id="isolationLevel">
                    {% for level in isolation_levels %}
                    <option value="{{ level }}">{{ level }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="queries-container">
                <div class="query-box">
                    <h3>📝 Запрос 1</h3>
                    <textarea id="query1" placeholder="Введите SQL запрос..."></textarea>
                    <div class="schema-info" id="schemaInfo1"></div>
                </div>
                <div class="query-box">
                    <h3>📝 Запрос 2</h3>
                    <textarea id="query2" placeholder="Введите SQL запрос..."></textarea>
                    <div class="schema-info" id="schemaInfo2"></div>
                </div>
            </div>

            <div class="button-group">
                <button onclick="executeQueries()">🚀 Выполнить параллельно</button>
                <button onclick="clearResults()">🗑️ Очистить результаты</button>
            </div>
        </div>

        <div class="results" id="results">
            <h3>📊 Результаты выполнения</h3>
            <div id="resultsContent">
                <div class="info">Подключитесь к базе данных и выполните запросы...</div>
            </div>
        </div>
    </div>

    <script>
        let currentTables = [];

        async function connectDatabase() {
            const dbParams = {
                host: document.getElementById('dbHost').value,
                port: document.getElementById('dbPort').value,
                user: document.getElementById('dbUser').value,
                password: document.getElementById('dbPassword').value,
                database: document.getElementById('dbName').value
            };

            try {
                const response = await fetch('/connect_db', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dbParams)
                });

                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('connectionStatus').textContent = 'Подключено';
                    document.getElementById('connectionStatus').className = 'status-badge connected';
                    showNotification('success', data.message);
                    currentTables = data.tables;
                    showTablesList(data.tables);
                } else {
                    showNotification('error', data.message);
                }
            } catch (error) {
                showNotification('error', 'Ошибка подключения: ' + error.message);
            }
        }

        async function showTables() {
            try {
                const response = await fetch('/get_tables');
                const data = await response.json();
                if (data.status === 'success') {
                    showTablesList(data.tables);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function showTablesList(tables) {
            if (tables.length === 0) {
                document.getElementById('schemaInfo1').innerHTML = '❌ Нет таблиц в базе данных';
                return;
            }

            let html = '<strong>📋 Таблицы в БД:</strong><br>';
            tables.forEach(table => {
                html += `• ${table.name} (${table.columns} колонок)<br>`;
            });
            html += '<br><small>💡 Нажмите на название таблицы чтобы вставить SELECT * FROM ...</small>';

            document.getElementById('schemaInfo1').innerHTML = html;
            document.getElementById('schemaInfo2').innerHTML = html;

            // Добавляем возможность клика по таблицам
            currentTables = tables;
        }

        async function uploadDump() {
            const fileInput = document.getElementById('dumpFile');
            if (!fileInput.files[0]) {
                showNotification('error', 'Выберите файл дампа');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            showNotification('info', 'Загрузка дампа...');

            try {
                const response = await fetch('/upload_dump', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.status === 'success') {
                    showNotification('success', data.message);
                    await connectDatabase(); // Переподключаемся для обновления списка таблиц
                } else {
                    showNotification('error', data.message);
                }
            } catch (error) {
                showNotification('error', 'Ошибка загрузки: ' + error.message);
            }
        }

        async function executeQueries() {
            const query1 = document.getElementById('query1').value;
            const query2 = document.getElementById('query2').value;
            const isolationLevel = document.getElementById('isolationLevel').value;

            if (!query1 || !query2) {
                showNotification('error', 'Введите оба SQL запроса');
                return;
            }

            const resultsDiv = document.getElementById('resultsContent');
            resultsDiv.innerHTML = '<div class="info">⏳ Выполнение запросов...</div>';

            try {
                const response = await fetch('/execute', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        query1: query1,
                        query2: query2,
                        isolation_level: isolationLevel
                    })
                });

                const data = await response.json();
                displayResults(data.results, isolationLevel);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
            }
        }

        function displayResults(results, isolationLevel) {
            const resultsDiv = document.getElementById('resultsContent');

            let html = `<div class="info">🔒 Уровень изоляции: <strong>${isolationLevel}</strong></div>`;

            results.forEach(result => {
                html += `
                    <div class="result-item">
                        <div class="result-header">
                            Запрос ${result.query_num} (${result.query_type || 'UNKNOWN'})
                        </div>
                        <div class="result-content">
                `;

                if (result.success) {
                    if (result.query_type === 'SELECT') {
                        html += `<div class="success">✅ Успешно (${result.rows_count} строк)</div>`;
                        if (result.data && result.data.length > 0) {
                            html += '<table>';
                            const headers = Object.keys(result.data[0]);
                            html += '<tr>';
                            headers.forEach(header => {
                                html += `<th>${header}</th>`;
                            });
                            html += '</tr>';

                            result.data.forEach(row => {
                                html += '<tr>';
                                headers.forEach(header => {
                                    let value = row[header];
                                    if (value === null) value = 'NULL';
                                    if (typeof value === 'object') value = JSON.stringify(value);
                                    html += `<td>${value}</td>`;
                                });
                                html += '</tr>';
                            });
                            html += '</table>';
                        } else {
                            html += '<div class="info">Запрос не вернул данных</div>';
                        }
                    } else {
                        html += `<div class="success">✅ ${result.message || 'Выполнено успешно'}</div>`;
                    }
                } else {
                    html += `<div class="error">❌ Ошибка: ${result.error}</div>`;
                }

                html += `
                        </div>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        function clearResults() {
            document.getElementById('resultsContent').innerHTML = '<div class="info">Результаты очищены</div>';
        }

        function showNotification(type, message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px;
                background: ${type === 'success' ? '#4caf50' : type === 'error' ? '#f44336' : '#2196f3'};
                color: white;
                border-radius: 5px;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Добавляем анимацию
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
